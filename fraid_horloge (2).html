<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraid Support — Horloge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 36px;
    min-height: 120px;
    gap: 24px;
  }
  .left { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .greeting {
    font-size: 48px;
    font-weight: 700;
    color: #0d7a5f;
    letter-spacing: -1px;
    line-height: 1;
  }
  .greeting em {
    color: #1bc8a0;
    font-style: normal;
  }
  .date-line {
    font-size: 15px;
    color: #9ca3af;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #1bc8a0;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  .citation {
    font-size: 13px;
    color: #6b7280;
    font-style: italic;
    border-left: 3px solid #1bc8a0;
    padding-left: 10px;
    margin-top: 4px;
    line-height: 1.5;
    max-width: 480px;
  }
  .right { text-align: right; flex-shrink: 0; }
  .clock {
    font-size: 52px;
    font-weight: 700;
    color: #111827;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .clock-sub {
    font-size: 13px;
    color: #9ca3af;
    margin-top: 6px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="left">
  <div class="greeting" id="greeting">Bonsoir <em>👋</em></div>
  <div class="date-line"><span class="dot"></span><span id="dateline">--</span></div>
  <div class="citation" id="citation"></div>
</div>
<div class="right">
  <div class="clock" id="clock">--:--:--</div>
  <div class="clock-sub">Heure locale</div>
</div>

<script>
const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

const CITATIONS = [
  "La clé du succès, c'est de commencer avant d'être prêt.",
  "Chaque grand voyage commence par un premier pas.",
  "Le secret pour avancer, c'est de commencer.",
  "Travaillez dur en silence. Laissez le succès faire le bruit.",
  "Votre seule limite, c'est vous-même.",
  "Un jour ou jour 1 — c'est vous qui choisissez.",
  "Le succès est la somme de petits efforts répétés chaque jour.",
  "Faites de chaque jour votre chef-d'œuvre.",
  "La discipline est le pont entre les objectifs et les accomplissements.",
  "Commencez là où vous êtes. Utilisez ce que vous avez. Faites ce que vous pouvez.",
  "Les grandes choses ne sont jamais faites par impulsion, mais par une série de petites choses réunies.",
  "Ne comptez pas les jours, faites que les jours comptent.",
  "Croyez en vous et tout devient possible.",
  "L'action est la clé fondamentale de tout succès.",
  "Votre attitude détermine votre direction.",
  "Le meilleur moment pour planter un arbre, c'était il y a 20 ans. Le deuxième meilleur moment, c'est maintenant.",
  "Soyez la raison pour laquelle quelqu'un sourit aujourd'hui.",
  "Chaque expert a été un débutant.",
  "La progression, pas la perfection.",
  "Votre futur se crée par ce que vous faites aujourd'hui.",
  "Osez, et la force vous sera donnée.",
  "Les obstacles sont ces choses effrayantes que vous voyez quand vous détournez les yeux de votre objectif.",
  "Ce n'est pas l'environnement qui compte, c'est l'énergie que vous y mettez.",
  "Chaque nouvelle journée est une chance de changer votre vie.",
  "Restez focalisé, restez déterminé, restez positif.",
  "La persévérance est la mère du succès.",
  "Votre potentiel est infini.",
  "Faites ce que vous aimez et vous ne travaillerez pas un seul jour de votre vie.",
  "Le succès appartient à ceux qui croient en la beauté de leurs rêves.",
  "Soyez tellement occupé à vous améliorer que vous n'avez pas le temps de critiquer les autres.",
  "Tout ce dont vous avez besoin est déjà en vous."
];

function pad(n) { return String(n).padStart(2, '0'); }

function getGreeting(h) {
  if (h >= 18) return 'Bonsoir <em>🌙</em>';
  if (h >= 12) return 'Bon après-midi <em>☀️</em>';
  return 'Bonjour <em>👋</em>';
}

function getCitation() {
  const today = new Date();
  const idx = (today.getDate() + today.getMonth()) % CITATIONS.length;
  return '« ' + CITATIONS[idx] + ' »';
}

function tick() {
  const now = new Date();
  const h = now.getHours();
  document.getElementById('clock').textContent = pad(h) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  document.getElementById('greeting').innerHTML = getGreeting(h);
  document.getElementById('dateline').textContent = JOURS[now.getDay()] + ' ' + now.getDate() + ' ' + MOIS[now.getMonth()] + ' ' + now.getFullYear();
}

document.getElementById('citation').textContent = getCitation();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
