<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraid Support — Horloge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    min-height: 80px;
  }
  .left { display: flex; flex-direction: column; gap: 4px; }
  .greeting {
    font-size: 22px;
    font-weight: 600;
    color: #0d7a5f;
    letter-spacing: -0.3px;
  }
  .greeting span {
    color: #1bc8a0;
  }
  .subline {
    font-size: 13px;
    color: #6b7280;
  }
  .right { text-align: right; }
  .clock {
    font-size: 28px;
    font-weight: 600;
    color: #111827;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
  }
  .date-line {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 2px;
  }
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #1bc8a0;
    margin-right: 6px;
    vertical-align: 1px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="left">
  <div class="greeting" id="greeting">Bonjour 👋</div>
  <div class="subline"><span class="dot"></span><span id="subline">Voici votre espace de la semaine</span></div>
</div>
<div class="right">
  <div class="clock" id="clock">--:--:--</div>
  <div class="date-line" id="dateline">--</div>
</div>

<script>
const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function pad(n) { return String(n).padStart(2, '0'); }

function getGreeting(h) {
  if (h >= 18) return 'Bonsoir 🌙';
  if (h >= 12) return 'Bon après-midi ☀️';
  return 'Bonjour 👋';
}

function getSubline(h) {
  if (h >= 18) return 'Bonne fin de journée !';
  if (h >= 12) return 'Votre après-midi en un coup d\'œil';
  return 'Voici votre espace de la semaine';
}

function tick() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  document.getElementById('clock').textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
  document.getElementById('greeting').textContent = getGreeting(h);
  document.getElementById('subline').textContent = getSubline(h);
  document.getElementById('dateline').textContent =
    JOURS[now.getDay()] + ' ' + now.getDate() + ' ' + MOIS[now.getMonth()] + ' ' + now.getFullYear();
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
