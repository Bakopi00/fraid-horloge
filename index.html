<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraid Support — Horloge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: transparent;
    padding: 24px 32px;
    min-height: 100vh;
  }

  /* Adaptation automatique mode clair / sombre */
  @media (prefers-color-scheme: dark) {
    .greeting { color: #A6D9D0; }
    .greeting em { color: #4fd1b8; }
    .clock { color: #f9fafb; }
    .date-line { color: #6b7280; }
    .clock-sub { color: #6b7280; }
  }
  @media (prefers-color-scheme: light) {
    .greeting { color: #A6D9D0; }
    .greeting em { color: #A6D9D0; }
    .clock { color: #111827; }
    .date-line { color: #9ca3af; }
    .clock-sub { color: #9ca3af; }
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .left { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 200px; }

  .greeting {
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }
  .greeting em { font-style: normal; }

  .date-line {
    font-size: clamp(12px, 2vw, 15px);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #1bc8a0;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  .right { text-align: right; flex-shrink: 0; }
  .clock {
    font-size: clamp(36px, 7vw, 60px);
    font-weight: 700;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .clock-sub {
    font-size: clamp(11px, 1.8vw, 13px);
    margin-top: 6px;
  }

  @media (max-width: 480px) {
    body { padding: 16px 18px; }
    .header { flex-direction: column; align-items: flex-start; }
    .right { text-align: left; margin-top: 8px; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="left">
    <div class="greeting" id="greeting">Bonsoir <em>🌙</em></div>
    <div class="date-line"><span class="dot"></span><span id="dateline">--</span></div>
  </div>
  <div class="right">
    <div class="clock" id="clock">--:--:--</div>
    <div class="clock-sub">Heure locale</div>
  </div>
</div>

<script>
const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function pad(n) { return String(n).padStart(2, '0'); }

function getGreeting(h) {
  if (h >= 18) return 'Bonsoir <em>🌙</em>';
  if (h >= 12) return 'Bon après-midi <em>☀️</em>';
  return 'Bonjour <em>👋</em>';
}

function tick() {
  const now = new Date();
  const h = now.getHours();
  document.getElementById('clock').textContent = pad(h) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  document.getElementById('greeting').innerHTML = getGreeting(h);
  document.getElementById('dateline').textContent = JOURS[now.getDay()] + ' ' + now.getDate() + ' ' + MOIS[now.getMonth()] + ' ' + now.getFullYear();
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
